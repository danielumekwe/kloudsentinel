<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}KloudSentinel{% endblock %}</title>
  <link rel="stylesheet" href="{{ base_path }}/static/css/dashboard.css">
</head>
<body>
  {% if admin_user %}
  <header class="topbar">
    <div class="brand">KloudSentinel</div>
    <nav>
      <a href="{{ base_path }}">Dashboard</a>
      <a href="{{ base_path }}/threats">Malware Findings</a>
      <a href="{{ base_path }}/incidents">Incidents</a>
      <a href="{{ base_path }}/quarantine">Quarantine</a>
      <a href="{{ base_path }}/scans">Scan Management</a>
      <a href="{{ base_path }}/settings">Settings</a>
    </nav>
    <form method="post" action="{{ base_path }}/logout" class="logout-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <span class="username">{{ admin_user.username }}</span>
      <button type="submit" class="link-button">Log out</button>
    </form>
  </header>
  {% endif %}
  <main class="content">
    {% block content %}{% endblock %}
  </main>
  <script src="{{ base_path }}/static/js/dashboard.js"></script>
</body>
</html>
